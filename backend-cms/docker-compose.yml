version: '3'

services:
  payload:
    build:
      context: .
      dockerfile: Dockerfile  # ← usa tu Dockerfile
    ports:
      - '3000:3000'
    depends_on:
      - mongo
    env_file:
      - .env

  # Ensure your DATABASE_URL uses 'mongo' as the hostname ie. mongodb://mongo/my-db-name
  mongo:
    image: mongo
    restart: always
    container_name: db
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    ports:
      - '27017:27017'
    command:
      - --storageEngine=wiredTiger
    volumes:
      - data:/data/db
    logging:
      driver: none
volumes:
  data:
  node_modules: